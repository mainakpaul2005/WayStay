# =========================
# Application Info
# =========================
spring.application.name=backend
server.port=8080

# =========================
# Database Configuration
# =========================
# Use environment variables in production, fallback to local dev DB
# Local Dev Fallback: jdbc:mysql://localhost:3306/waystay (user=root, pass=mainak2005)
# Prod Fallback: jdbc:mysql://localhost:3306/waystay_db (user=waystay_user, pass=StrongPassword123!)
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://localhost:3306/waystay?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:mainak2005}

# =========================
# JPA / Hibernate
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================
# JWT Security
# =========================
# In production, set via environment variables
app.jwtSecret=${JWT_SECRET:change-this-secret-for-dev-and-make-it-very-long}
app.jwtExpirationMs=${JWT_EXPIRATION_MS:3600000}  # 1 hour

# =========================
# Logging (optional)
# =========================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
